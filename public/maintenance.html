<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(34, 197, 94, 0.05) 0%, transparent 60%);
      animation: bgShift 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgShift {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      background: rgba(56, 189, 248, 0.15);
      pointer-events: none;
      animation: float linear infinite;
    }
    .particle:nth-child(1) { width: 6px; height: 6px; left: 15%; animation-duration: 18s; animation-delay: 0s; }
    .particle:nth-child(2) { width: 4px; height: 4px; left: 35%; animation-duration: 22s; animation-delay: -4s; background: rgba(168, 85, 247, 0.15); }
    .particle:nth-child(3) { width: 8px; height: 8px; left: 55%; animation-duration: 16s; animation-delay: -8s; }
    .particle:nth-child(4) { width: 5px; height: 5px; left: 75%; animation-duration: 20s; animation-delay: -2s; background: rgba(34, 197, 94, 0.12); }
    .particle:nth-child(5) { width: 3px; height: 3px; left: 90%; animation-duration: 24s; animation-delay: -6s; background: rgba(168, 85, 247, 0.12); }

    @keyframes float {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2.5rem;
      max-width: 560px;
      animation: fadeUp 0.8s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #f8fafc, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      h1 { font-size: 1.75rem; }
      .subtitle { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="container">
    <h1>We'll Be Back Soon</h1>
    <p class="subtitle">
      Our website is currently undergoing scheduled maintenance.<br />
      We're working hard to improve your experience.
    </p>
  </div>
</body>
</html>
